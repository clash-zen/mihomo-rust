# Release: triggered by tag push v* (e.g. v0.1.0).
#
# Flow:
#   1) quality        — Ubuntu: fmt + clippy + test (same as CI gate).
#   2) build (matrix) — needs quality. Per OS: release-build it_works + mihomo-sys c-shared,
#                       package LICENSE + binary + libmihomo into tar.gz or zip + sha256.
#   3) github-release — needs build. Merge all dist-* artifacts and upload to GitHub Release.
#
# mihomo-sys output: target/release/build/mihomo-sys-*/out/dylib/<goos>-<goarch>/
# (see docs/BUILD.md).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality gate (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-go@v5
        with:
          go-version-file: mihomo-sys/builder/go.mod
          cache-dependency-path: mihomo-sys/builder/go.sum
      - name: Install gcc (CGO)
        run: sudo apt-get update && sudo apt-get install -y gcc
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  build:
    name: Release binary (${{ matrix.slug }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            slug: linux-x86_64
            goos: linux
            goarch: amd64
          - os: macos-latest
            slug: darwin-aarch64
            goos: darwin
            goarch: arm64
          - os: macos-13
            slug: darwin-x86_64
            goos: darwin
            goarch: amd64
          - os: windows-latest
            slug: windows-x86_64
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version-file: mihomo-sys/builder/go.mod
          cache-dependency-path: mihomo-sys/builder/go.sum
      - name: Install gcc (Linux CGO)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Install MinGW (Windows CGO)
        if: runner.os == 'Windows'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64
      - name: cargo build --release -p it_works
        run: cargo build --release -p it_works
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
        run: |
          set -euo pipefail
          if [[ "${GOOS}" == "darwin" ]]; then
            LIB_NAME="libmihomo.dylib"
          else
            LIB_NAME="libmihomo.so"
          fi
          LIB_FILE=$(find target/release/build -path "*/mihomo-sys-*/out/dylib/*/${LIB_NAME}" 2>/dev/null | head -n1)
          if [[ -z "${LIB_FILE}" ]] || [[ ! -f "${LIB_FILE}" ]]; then
            echo "Could not find ${LIB_NAME} under target/release/build/mihomo-sys-*/out/dylib/"
            exit 1
          fi
          STAGE="stage-${SLUG}"
          rm -rf "${STAGE}"
          mkdir -p "${STAGE}"
          cp LICENSE "${STAGE}/"
          cp "target/release/it_works" "${STAGE}/"
          cp "${LIB_FILE}" "${STAGE}/"
          ARCHIVE="mihomo-rust-${VERSION}-${SLUG}.tar.gz"
          tar -czvf "${ARCHIVE}" -C "${STAGE}" .
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SLUG: ${{ matrix.slug }}
          VERSION: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $lib = Get-ChildItem -Path target\release\build -Recurse -Filter mihomo.dll -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'mihomo-sys-.*\\out\\dylib\\' } |
            Select-Object -First 1
          if (-not $lib) { throw "mihomo.dll not found under target/release/build" }
          $stage = "stage-$($env:SLUG)"
          Remove-Item -Recurse -Force $stage -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item LICENSE $stage\
          Copy-Item "target/release/it_works.exe" $stage\
          Copy-Item $lib.FullName $stage\
          $archive = "mihomo-rust-$($env:VERSION)-$($env:SLUG).zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $archive -Force
          $h = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$h  $(Split-Path -Leaf $archive)" | Set-Content "${archive}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.slug }}
          path: mihomo-rust-*

  github-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: List release files
        run: ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
